{% include 'navbar.html' %}

<div class="container mt-5" style="max-width: 700px;">
    <div class="card shadow">
        <div class="card-body">
            <h2 class="text-center mb-4">Update Post</h2>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Slug</label>
                    <input type="text" name="slug" class="form-control" value="{{ post.slug }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Content</label>
                    <textarea name="content" rows="6" class="form-control" required>{{ post.content }}</textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">Update Post</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
